apiVersion: v1
kind: Namespace
metadata:
  name: pod-blocker-system
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: pod-blocker
  namespace: pod-blocker-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: pod-blocker
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create", "get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: pod-blocker
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: pod-blocker
subjects:
  - kind: ServiceAccount
    name: pod-blocker
    namespace: pod-blocker-system
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: pod-blocker
  namespace: pod-blocker-system
spec:
  selector:
    matchLabels:
      app: pod-blocker
  template:
    metadata:
      labels:
        app: pod-blocker
    spec:
      serviceAccountName: pod-blocker
      hostNetwork: true
      hostPID: true
      nodeSelector:
        kubernetes.io/os: linux
      tolerations:
        - operator: Exists
      containers:
        - name: pod-blocker
          image: ythwork/pod-blocker:1.0.0
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true
          env:
            - name: MY_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: TARGET_NAMESPACE
              value: auth
            - name: LABEL_SELECTOR
              value: app=authorization-server
          volumeMounts:
            - name: bpffs
              mountPath: /sys/fs/bpf
            - name: debugfs
              mountPath: /sys/kernel/debug
            - name: lib-modules
              mountPath: /lib/modules
              readOnly: true
            - name: host-proc
              mountPath: /host/proc
              readOnly: true
      volumes:
        - name: bpffs
          hostPath:
            path: /sys/fs/bpf
            type: DirectoryOrCreate
        - name: debugfs
          hostPath:
            path: /sys/kernel/debug
            type: DirectoryOrCreate
        - name: lib-modules
          hostPath:
            path: /lib/modules
        - name: host-proc
          hostPath:
            path: /proc